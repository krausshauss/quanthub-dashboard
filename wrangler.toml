name = "quanthub-proxy"
main = "cloudflare-worker.js"
compatibility_date = "2024-01-01"
workers_dev = true
account_id = "20e7b178f91a4ca92328922dd22abdf2"

# This is a single-file app: index.html is bundled into the worker (imported as
# text) and served only after auth. No [assets] binding — nothing is public.

# Secrets (set once via wrangler CLI — never stored here):
#   wrangler secret put HUBSPOT_TOKEN     # HubSpot Private App token
#   wrangler secret put GITHUB_TOKEN      # GitHub classic token (data.json read/write)
#   wrangler secret put ADMIN_PIN         # 4-digit PIN gating PUT + /refresh (defense in depth)
#   wrangler secret put PORTAL_PASSWORD   # password used to log into the portal
#   wrangler secret put SESSION_SECRET    # long random string for HMAC-signing session cookies
